<style>
:root{

  --red:#FF3B30;--red-bg:#FFF0EF;--red-text:#8B0000;
  --amber:#FF9500;--amber-bg:#FFF8EC;--amber-text:#7A4500;
  --green:#34C759;--green-bg:#EDFAF2;--green-text:#1A5C2E;
  --purple:#AF52DE;--radius:12px;--radiuslg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px}
.topbar-title{font-size:15px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s,transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:transparent;color:var(--sub);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg)}
.main{max-width:1280px;margin:0 auto;padding:24px 28px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;align-items:center;gap:14px}
.kpi-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.kpi-icon.blue{background:var(--blue-bg);color:var(--blue)}
.kpi-icon.red{background:var(--red-bg);color:var(--red)}
.kpi-icon.amber{background:var(--amber-bg);color:var(--amber)}
.kpi-icon.green{background:var(--green-bg);color:var(--green)}
.kpi-icon.purple{background:#F5EEFF;color:var(--purple)}
.kpi-val{font-size:22px;font-weight:700;line-height:1}
.kpi-label{font-size:12px;color:var(--sub);margin-top:3px}
.alerts-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radiuslg);overflow:hidden;margin-bottom:20px}
.card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-header-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.alert-item{display:flex;align-items:center;gap:14px;padding:13px 20px;border-bottom:1px solid var(--border)}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-red{background:var(--red)}
.dot-amber{background:var(--amber)}
.alert-main{flex:1;min-width:0}
.alert-name{font-size:13px;font-weight:600}
.alert-sub{font-size:12px;color:var(--sub);margin-top:2px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-red{background:var(--red-bg);color:var(--red-text)}
.badge-amber{background:var(--amber-bg);color:var(--amber-text)}
.badge-green{background:var(--green-bg);color:var(--green-text)}
.badge-blue{background:var(--blue-bg);color:var(--blue-text)}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radiuslg);overflow:hidden}
.table-toolbar{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:16px;pointer-events:none}
.search-wrap input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg);color:var(--text);outline:none}
.search-wrap input:focus{border-color:var(--blue);background:#fff}
select.filter{padding:8px 12px;border:1px solid var(--border);border-radius:10px;font-size:13px;background:var(--bg);color:var(--text);outline:none;cursor:pointer}
select.filter:focus{border-color:var(--blue)}
.group{border-bottom:1px solid var(--border)}
.group:last-child{border-bottom:none}
.group-header{padding:11px 20px;background:#FAFAFA;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.group-header:hover{background:#F5F5F5}
.group-name{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
.group-meta{display:flex;align-items:center;gap:10px}
.group-count{font-size:12px;color:var(--sub)}
.group-total{font-size:12px;font-weight:600}
.chevron{font-size:14px;color:var(--sub);transition:transform .2s}
.chevron.open{transform:rotate(180deg)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{padding:9px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.05em;background:#FAFAFA;border-bottom:1px solid var(--border)}
tbody td{padding:11px 16px;border-bottom:1px solid rgba(0,0,0,0.05);color:var(--text);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#FAFAFA}
.col-placa{font-family:'SF Mono',Menlo,monospace;font-size:12px;letter-spacing:.5px;color:var(--sub)}
.col-val{font-weight:600}
.col-valant{color:var(--sub);font-size:12px}
.action-btn{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:7px;color:var(--sub);font-size:15px;transition:background .15s,color .15s}
.action-btn:hover{background:var(--bg);color:var(--text)}
.action-btn.del:hover{background:var(--red-bg);color:var(--red)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.2)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:17px;font-weight:700}
.modal-close{background:none;border:none;cursor:pointer;width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:18px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:12px;font-weight:600;color:var(--sub)}
input[type=text],input[type=number],input[type=date],select.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:#fff;outline:none;transition:border-color .15s}
input:focus,select.form-select:focus{border-color:var(--blue)}
.section-label{font-size:11px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin:0 0 8px;padding:0 20px}
.empty-state{padding:48px;text-align:center;color:var(--sub)}
.empty-state i{font-size:40px;margin-bottom:12px;display:block;opacity:.3}
.empty-state p{font-size:14px}
.toast{position:fixed;bottom:24px;right:24px;background:#1C1C1E;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;display:flex;align-items:center;gap:8px}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:600px){.main{padding:16px}.form-grid{grid-template-columns:1fr}.topbar{padding:0 16px}}
</style>
</head>

    </div>
    <div id="alerts-body"></div>
  </div>
  <div style="margin-bottom:12px;display:flex;align-items:center;justify-content:space-between">

    <span id="result-count" style="font-size:12px;color:var(--sub)"></span>
  </div>
  <div class="table-card">
    <div class="table-toolbar">
      <div class="search-wrap">
        <i class="ti ti-search"></i>
        <input type="text" id="search" placeholder="Buscar cliente, placa ou veículo...">
      </div>
      <select class="filter" id="filterStatus">
        <option value="">Todos os status</option>
        <option value="vencido">Vencido</option>
        <option value="urgente">Vence em 30 dias</option>
        <option value="ok">Em dia</option>
        <option value="mensal">Mensal</option>
      </select>
      <select class="filter" id="filterCliente">
        <option value="">Todos os clientes</option>
      </select>
    </div>
    <div id="table-body"></div>
  </div>
</div>

<div class="overlay" id="overlay">

      <span class="modal-title" id="modal-title">Novo contrato</span>
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Cliente *</label>
          <input type="text" id="f-cliente" placeholder="Nome do cliente" list="clientes-list">
          <datalist id="clientes-list"></datalist>
        </div>
        <div class="form-group">
          <label>Veículo *</label>
          <input type="text" id="f-carro" placeholder="Ex: Polo, Argo, Mobi">
        </div>
        <div class="form-group">
          <label>Placa *</label>
          <input type="text" id="f-placa" placeholder="Ex: ABC1D23" maxlength="8" style="text-transform:uppercase">
        </div>
        <div class="form-group">
          <label>Valor anterior (R$)</label>
          <input type="number" id="f-valant" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>Valor atual (R$) *</label>
          <input type="number" id="f-valor" placeholder="0,00" step="0.01" min="0">
        </div>
        <div class="form-group">
          <label>Tipo de contrato</label>
          <select class="form-select" id="f-tipo">
            <option value="mensal">Mensal</option>
            <option value="3 meses">3 meses</option>
            <option value="4 meses">4 meses</option>
            <option value="5 meses">5 meses</option>
            <option value="6 meses">6 meses</option>
            <option value="12 meses">12 meses (anual)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Data do último reajuste</label>
          <input type="date" id="f-dtreaj">
        </div>
        <div class="form-group">
          <label>Próximo vencimento</label>
          <input type="date" id="f-venc">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()"><i class="ti ti-check"></i> Salvar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

try{const s=localStorage.getItem('rj_extra');if(s){const p=JSON.parse(s);EXTRA=p.map(c=>({...c,dt_reaj:c.dt_reaj?new Date(c.dt_reaj):null,vencimento:c.vencimento?new Date(c.vencimento):null}));}}catch(e){}
try{const n=localStorage.getItem('rj_id');if(n)nextId=parseInt(n);}catch(e){}
function saveExtra(){try{localStorage.setItem('rj_extra',JSON.stringify(EXTRA.map(c=>({...c,dt_reaj:c.dt_reaj?c.dt_reaj.toISOString():null,vencimento:c.vencimento?c.vencimento.toISOString():null}))));localStorage.setItem('rj_id',String(nextId));}catch(e){}}
function allData(){return[...BASE,...EXTRA];}

function render(){
  const ALL=allData();
  const q=(document.getElementById('search').value||'').toLowerCase();
  const fs=document.getElementById('filterStatus').value;
  const fc=document.getElementById('filterCliente').value;
  const vencidos=ALL.filter(c=>getStatus(c)==='vencido');
  const urgentes=ALL.filter(c=>getStatus(c)==='urgente');
  const emDia=ALL.filter(c=>getStatus(c)==='ok');
  const totalVal=ALL.reduce((s,c)=>s+parseFloat(c.valor||0),0);

  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-icon blue"><i class="ti ti-car"></i></div><div class="kpi-info"><div class="kpi-val">${ALL.length}</div><div class="kpi-label">Veículos ativos</div></div></div>
    <div class="kpi"><div class="kpi-icon red"><i class="ti ti-alert-triangle"></i></div><div class="kpi-info"><div class="kpi-val" style="color:var(--red)">${vencidos.length}</div><div class="kpi-label">Vencidos</div></div></div>
    <div class="kpi"><div class="kpi-icon amber"><i class="ti ti-clock"></i></div><div class="kpi-info"><div class="kpi-val" style="color:var(--amber)">${urgentes.length}</div><div class="kpi-label">Vencem em 30 dias</div></div></div>
    <div class="kpi"><div class="kpi-icon green"><i class="ti ti-circle-check"></i></div><div class="kpi-info"><div class="kpi-val" style="color:var(--green)">${emDia.length}</div><div class="kpi-label">Em dia</div></div></div>
    <div class="kpi"><div class="kpi-icon purple"><i class="ti ti-currency-dollar"></i></div><div class="kpi-info"><div class="kpi-val" style="font-size:15px">${fmtBRL(totalVal)}</div><div class="kpi-label">Receita mensal</div></div></div>
  `;

  const alertsData=[
    ...vencidos.map(c=>({...c,st:'vencido',dias:diffDias(c.vencimento)})),
    ...urgentes.map(c=>({...c,st:'urgente',dias:diffDias(c.vencimento)})),
  ].sort((a,b)=>a.dias-b.dias);

  document.getElementById('alert-count').textContent=alertsData.length+' alerta'+(alertsData.length!==1?'s':'');
  document.getElementById('alerts-card').style.display=alertsData.length?'':'none';
  document.getElementById('alerts-body').innerHTML=alertsData.map(c=>`
    <div class="alert-item">
      <div class="alert-dot ${c.st==='vencido'?'dot-red':'dot-amber'}"></div>
      <div class="alert-main">
        <div class="alert-name">${c.cliente} — ${c.carro} <span style="font-weight:400;color:var(--sub);font-size:12px">${c.placa}</span></div>
        <div class="alert-sub">Vencimento: ${fmtDate(c.vencimento)} · Valor atual: ${fmtBRL(c.valor)} · ${c.tipo}</div>
      </div>
      <span class="badge ${c.st==='vencido'?'badge-red':'badge-amber'}">${c.st==='vencido'?Math.abs(c.dias)+'d em atraso':c.dias+'d restantes'}</span>
      <button class="action-btn" title="Registrar reajuste" onclick="openModal(${c.id})"><i class="ti ti-refresh"></i></button>
    </div>
  `).join('');

  const clientes=[...new Set(ALL.map(c=>c.cliente))].sort();
  const selCl=document.getElementById('filterCliente');
  const curVal=selCl.value;
  selCl.innerHTML='<option value="">Todos os clientes</option>'+clientes.map(cl=>`<option value="${cl}" ${cl===curVal?'selected':''}>${cl}</option>`).join('');
  document.getElementById('clientes-list').innerHTML=clientes.map(cl=>`<option value="${cl}">`).join('');

  const filtered=ALL.filter(c=>{
    const st=getStatus(c);
    if(fs&&st!==fs)return false;
    if(fc&&c.cliente!==fc)return false;
    if(q&&!(c.cliente.toLowerCase().includes(q)||c.placa.toLowerCase().includes(q)||c.carro.toLowerCase().includes(q)))return false;
    return true;
  });

  document.getElementById('result-count').textContent=filtered.length+' contrato'+(filtered.length!==1?'s':'');

  const byClient={};
  filtered.forEach(c=>{if(!byClient[c.cliente])byClient[c.cliente]=[];byClient[c.cliente].push(c);});
  const area=document.getElementById('table-body');
  if(!filtered.length){area.innerHTML='<div class="empty-state"><i class="ti ti-search"></i><p>Nenhum contrato encontrado.</p></div>';return;}

  area.innerHTML=Object.entries(byClient).sort((a,b)=>a[0].localeCompare(b[0])).map(([cl,rows])=>{
    const tot=rows.reduce((s,c)=>s+parseFloat(c.valor||0),0);
    const nalerts=rows.filter(c=>['vencido','urgente'].includes(getStatus(c))).length;
    const gkey=cl.replace(/[^a-z0-9]/gi,'_');
    if(openGroups[gkey]===undefined)openGroups[gkey]=true;
    const isOpen=openGroups[gkey];
    return `<div class="group">
      <div class="group-header" onclick="toggleGroup('${gkey}')">
        <div class="group-name">${nalerts?`<span class="badge badge-red">${nalerts}</span>`:''} ${cl}</div>
        <div class="group-meta">
          <span class="group-count">${rows.length} veículo${rows.length>1?'s':''}</span>
          <span class="group-total">${fmtBRL(tot)}/mês</span>
          <i class="ti ti-chevron-down chevron ${isOpen?'open':''}"></i>
        </div>
      </div>
      ${isOpen?`<table>
        <thead><tr><th>Veículo</th><th>Placa</th><th>Tipo</th><th>Último reajuste</th><th>Próx. vencimento</th><th>Valor ant.</th><th>Valor atual</th><th>Status</th><th></th></tr></thead>
        <tbody>${rows.map(c=>{
          const st=getStatus(c);
          const dias=diffDias(c.vencimento);
          const pill=st==='vencido'?'badge-red':st==='urgente'?'badge-amber':st==='mensal'?'badge-blue':'badge-green';
          const pillTxt=st==='vencido'?'Vencido':st==='urgente'?'Atenção':st==='mensal'?'Mensal':'Em dia';
          const diasHtml=dias!==null&&dias<=30?`<div style="font-size:11px;margin-top:2px;color:${dias<0?'var(--red)':'var(--amber)'}">${dias<0?Math.abs(dias)+'d atraso':dias+'d restantes'}</div>`:'';
          return `<tr>
            <td>${c.carro}</td>
            <td class="col-placa">${c.placa}</td>
            <td>${c.tipo}</td>
            <td>${fmtDate(c.dt_reaj)}</td>
            <td>${fmtDate(c.vencimento)}${diasHtml}</td>
            <td class="col-valant">${c.valor_ant?fmtBRL(c.valor_ant):'—'}</td>
            <td class="col-val">${fmtBRL(c.valor)}</td>
            <td><span class="badge ${pill}">${pillTxt}</span></td>
            <td style="white-space:nowrap">
              <button class="action-btn" title="Editar" onclick="openModal(${c.id})"><i class="ti ti-edit"></i></button>
              ${c.id>=1000?`<button class="action-btn del" title="Excluir" onclick="delContrato(${c.id})"><i class="ti ti-trash"></i></button>`:''}
            </td>
          </tr>`;
        }).join('')}</tbody>
      </table>`:''}
    </div>`;
  }).join('');
}

function toggleGroup(k){openGroups[k]=!openGroups[k];render();}

function openModal(id){
  editId=id||null;
  document.getElementById('modal-title').textContent=editId?'Editar contrato':'Novo contrato';
  if(editId){
    const c=allData().find(x=>x.id===editId);
    if(c){
      document.getElementById('f-cliente').value=c.cliente||'';
      document.getElementById('f-carro').value=c.carro||'';
      document.getElementById('f-placa').value=c.placa||'';
      document.getElementById('f-valant').value=c.valor_ant||'';
      document.getElementById('f-valor').value=c.valor||'';
      document.getElementById('f-tipo').value=c.tipo||'12 meses';
      document.getElementById('f-dtreaj').value=c.dt_reaj?c.dt_reaj.toISOString().split('T')[0]:'';
      document.getElementById('f-venc').value=c.vencimento?c.vencimento.toISOString().split('T')[0]:'';
    }
  }else{
    ['f-cliente','f-carro','f-placa','f-valant','f-valor','f-dtreaj','f-venc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('f-tipo').value='12 meses';
  }
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){document.getElementById('overlay').classList.remove('show');editId=null;}

function salvar(){
  const cliente=(document.getElementById('f-cliente').value||'').trim();
  const carro=(document.getElementById('f-carro').value||'').trim();
  const placa=(document.getElementById('f-placa').value||'').trim().toUpperCase();
  const valor=parseFloat(document.getElementById('f-valor').value)||0;
  if(!cliente||!carro||!valor){toast('Preencha os campos obrigatórios.','red');return;}
  const obj={
    id:editId&&editId>=1000?editId:nextId++,
    cliente,carro,placa,
    valor_ant:parseFloat(document.getElementById('f-valant').value)||0,
    valor,
    tipo:document.getElementById('f-tipo').value,
    dt_reaj:parseDate(document.getElementById('f-dtreaj').value),
    vencimento:parseDate(document.getElementById('f-venc').value),
  };
  if(editId&&editId>=1000){const idx=EXTRA.findIndex(x=>x.id===editId);if(idx>=0)EXTRA[idx]=obj;}
  else if(!editId||editId<1000)EXTRA.push(obj);
  saveExtra();closeModal();
  toast(editId&&editId>=1000?'Contrato atualizado!':'Contrato cadastrado!','green');
  render();
}

function delContrato(id){
  if(!confirm('Excluir este contrato?'))return;
  EXTRA=EXTRA.filter(c=>c.id!==id);saveExtra();
  toast('Contrato excluído.','red');render();
}

function toast(msg,type){
  const el=document.getElementById('toast');
  el.innerHTML=`<i class="ti ${type==='green'?'ti-check':'ti-alert-circle'}"></i> ${msg}`;
  el.style.background=type==='green'?'#1A5C2E':'#8B0000';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2800);
}

document.getElementById('search').addEventListener('input',render);
document.getElementById('filterStatus').addEventListener('change',render);
document.getElementById('filterCliente').addEventListener('change',render);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
render();
</script>
</body>
</html>
